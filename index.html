        // ==========================================
        // 網頁音訊合成器 (雙模式切換：戰情室 x 深度工作)
        // ==========================================
        class SciFiBGM {
            constructor() {
                this.ctx = null;
                this.isPlaying = false;
                this.masterGain = null;
                this.schedulerTimer = null;
                this.nextNoteTime = 0;
                this.currentStep = 0;
                this.volume = 0.5;
                
                this.mode = 'WAR_ROOM';
                this.drones = [];
                
                this.warRoomTempo = 115; 
                this.warRoomSequence = [82.41, 82.41, 98.00, 82.41, 73.42, 82.41, 61.74, 73.42];

                this.focusTempo = 70;
                this.focusSequence = [164.81, 123.47, 196.00, 123.47, 185.00, 123.47, 196.00, 123.47];
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            }

            setVolume(newVolume) {
                this.volume = newVolume;
                if (this.masterGain && this.ctx) {
                    this.masterGain.gain.setTargetAtTime(newVolume, this.ctx.currentTime, 0.1);
                }
            }

            setMode(newMode) {
                if (this.mode === newMode) return;
                this.mode = newMode;
                this.currentStep = 0;
                if (this.isPlaying) {
                    this.stopDrones();
                    this.startDrones();
                }
            }

            play() {
                if (this.isPlaying) return;
                this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();
                this.isPlaying = true;

                this.masterGain = this.ctx.createGain();
                this.masterGain.gain.value = this.volume;
                this.masterGain.connect(this.ctx.destination);

                this.startDrones();

                this.nextNoteTime = this.ctx.currentTime + 0.1;
                this.currentStep = 0;
                this.schedule();
            }

            startDrones() {
                if (this.mode === 'WAR_ROOM') {
                    const padOsc = this.ctx.createOscillator();
                    padOsc.type = 'sawtooth';
                    padOsc.frequency.value = 41.20; 
                    const padFilter = this.ctx.createBiquadFilter();
                    padFilter.type = 'lowpass';
                    padFilter.frequency.value = 150; 
                    
                    padOsc.connect(padFilter);
                    padFilter.connect(this.masterGain);
                    padOsc.start();
                    this.drones.push(padOsc);

                } else if (this.mode === 'FOCUS') {
                    const subOsc = this.ctx.createOscillator();
                    subOsc.type = 'triangle';
                    subOsc.frequency.value = 41.20; 
                    const subGain = this.ctx.createGain();
                    subGain.gain.value = 0.3;

                    const tensionOsc = this.ctx.createOscillator();
                    tensionOsc.type = 'sine';
                    tensionOsc.frequency.value = 82.41; 
                    const tensionGain = this.ctx.createGain();
                    tensionGain.gain.value = 0.15;

                    const lfo = this.ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.05;
                    const lfoGain = this.ctx.createGain();
                    lfoGain.gain.value = 0.2; 
                    
                    lfo.connect(lfoGain);
                    lfoGain.connect(subGain.gain);
                    lfoGain.connect(tensionGain.gain);

                    subOsc.connect(subGain);
                    tensionOsc.connect(tensionGain);
                    subGain.connect(this.masterGain);
                    tensionGain.connect(this.masterGain);

                    subOsc.start();
                    tensionOsc.start();
                    lfo.start();
                    this.drones.push(subOsc, tensionOsc, lfo);
                }
            }

            stopDrones() {
                this.drones.forEach(node => {
                    try { node.stop(); } catch(e){}
                    node.disconnect();
                });
                this.drones = [];
            }

            schedule() {
                if (!this.isPlaying) return;
                while (this.nextNoteTime < this.ctx.currentTime + 0.1) {
                    this.playNote(this.nextNoteTime);
                    this.nextNote();
                }
                this.schedulerTimer = setTimeout(() => this.schedule(), 25);
            }

            nextNote() {
                const tempo = this.mode === 'WAR_ROOM' ? this.warRoomTempo : this.focusTempo;
                const stepInterval = this.mode === 'WAR_ROOM' ? 0.25 : 0.5; 
                
                const secondsPerBeat = 60.0 / tempo;
                this.nextNoteTime += stepInterval * secondsPerBeat;
                
                const seqLength = this.mode === 'WAR_ROOM' ? this.warRoomSequence.length : this.focusSequence.length;
                this.currentStep = (this.currentStep + 1) % seqLength;
            }

            playNote(time) {
                if (this.mode === 'WAR_ROOM') {
                    this.playWarRoomNote(time);
                } else {
                    this.playFocusNote(time);
                }
            }

            playWarRoomNote(time) {
                const bassOsc = this.ctx.createOscillator();
                bassOsc.type = 'square'; 
                bassOsc.frequency.value = this.warRoomSequence[this.currentStep % this.warRoomSequence.length];

                const bassFilter = this.ctx.createBiquadFilter();
                bassFilter.type = 'lowpass';
                bassFilter.Q.value = 4; 
                bassFilter.frequency.setValueAtTime(1000, time);
                bassFilter.frequency.exponentialRampToValueAtTime(80, time + 0.1);

                const bassGain = this.ctx.createGain();
                bassGain.gain.setValueAtTime(0.4, time);
                bassGain.gain.exponentialRampToValueAtTime(0.01, time + 0.12);

                bassOsc.connect(bassFilter);
                bassFilter.connect(bassGain);
                bassGain.connect(this.masterGain);

                bassOsc.start(time);
                bassOsc.stop(time + 0.15);

                if (this.currentStep % 4 === 0) {
                    const tickOsc = this.ctx.createOscillator();
                    tickOsc.type = 'sine';
                    tickOsc.frequency.value = 2500; 
                    
                    const tickGain = this.ctx.createGain();
                    tickGain.gain.setValueAtTime(0.06, time);
                    tickGain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);

                    tickOsc.connect(tickGain);
                    tickGain.connect(this.masterGain);
                    
                    tickOsc.start(time);
                    tickOsc.stop(time + 0.05);
                }
            }

            playFocusNote(time) {
                const arpOsc = this.ctx.createOscillator();
                arpOsc.type = 'triangle';
                arpOsc.frequency.value = this.focusSequence[this.currentStep % this.focusSequence.length];

                const arpFilter = this.ctx.createBiquadFilter();
                arpFilter.type = 'lowpass';
                arpFilter.frequency.setValueAtTime(600, time); 
                arpFilter.frequency.exponentialRampToValueAtTime(150, time + 0.3); 

                const arpGain = this.ctx.createGain();
                arpGain.gain.setValueAtTime(0, time);
                arpGain.gain.linearRampToValueAtTime(0.15, time + 0.05); 
                arpGain.gain.exponentialRampToValueAtTime(0.001, time + 0.4);

                arpOsc.connect(arpFilter);
                arpFilter.connect(arpGain);
                arpGain.connect(this.masterGain);

                arpOsc.start(time);
                arpOsc.stop(time + 0.5);

                if (this.currentStep === 0) {
                    const pingOsc = this.ctx.createOscillator();
                    pingOsc.type = 'sine';
                    pingOsc.frequency.value = 1046.50; 
                    
                    const pingGain = this.ctx.createGain();
                    pingGain.gain.setValueAtTime(0.04, time);
                    pingGain.gain.exponentialRampToValueAtTime(0.0001, time + 1.5); 

                    pingOsc.connect(pingGain);
                    pingGain.connect(this.masterGain);
                    
                    pingOsc.start(time);
                    pingOsc.stop(time + 1.5);
                }

                const isDownbeat = (this.currentStep % 2 === 0);
                const clockOsc = this.ctx.createOscillator();
                const clockGain = this.ctx.createGain();
                const clockFilter = this.ctx.createBiquadFilter();

                if (isDownbeat) {
                    clockOsc.type = 'sine';
                    clockOsc.frequency.setValueAtTime(80, time);
                    clockOsc.frequency.exponentialRampToValueAtTime(20, time + 0.15); 
                    clockGain.gain.setValueAtTime(0.3, time);
                    clockGain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
                    clockFilter.type = 'lowpass';
                    clockFilter.frequency.value = 150; 
                } else {
                    clockOsc.type = 'triangle';
                    clockOsc.frequency.value = 1200; 
                    clockGain.gain.setValueAtTime(0.015, time); 
                    clockGain.gain.exponentialRampToValueAtTime(0.001, time + 0.03);
                    clockFilter.type = 'highpass';
                    clockFilter.frequency.value = 1500; 
                }

                clockOsc.connect(clockFilter);
                clockFilter.connect(clockGain);
                clockGain.connect(this.masterGain);

                clockOsc.start(time);
                clockOsc.stop(time + 0.15);
            }

            stop() {
                this.isPlaying = false;
                clearTimeout(this.schedulerTimer);
                this.stopDrones();
                if (this.masterGain) {
                    this.masterGain.disconnect();
                }
            }
        }

        // ==========================================
        // 輔助組件：雷達圖
        // ==========================================
        const RadarChart = ({ data }) => {
            const size = 260; 
            const center = size / 2;
            const radius = 80; 
            const dimensions = ['觀察定題', '假設推論', '實驗設計', '圖表判讀', '結論評估'];
            const dataKeys = ['observation', 'hypothesis', 'experiment', 'data', 'conclusion'];
            
            const getPoint = (value, index, max = 3) => {
                const angle = (Math.PI * 2 * index) / dimensions.length - Math.PI / 2;
                const distance = (value / max) * radius;
                return `${center + distance * Math.cos(angle)},${center + distance * Math.sin(angle)}`;
            };

            const polygonPoints = dataKeys.map((key, i) => getPoint(data[key] || 0, i)).join(' ');
            const backgroundPolygons = [1, 2, 3].map(level => dataKeys.map((_, i) => getPoint(level, i, 3)).join(' '));

            return (
                <svg width={size} height={size} className="mx-auto drop-shadow-lg overflow-visible">
                    {backgroundPolygons.map((points, i) => (
                        <polygon key={i} points={points} fill="none" stroke="#1f2937" strokeWidth="1" />
                    ))}
                    {dataKeys.map((_, i) => (
                        <line key={i} x1={center} y1={center} x2={getPoint(3, i).split(',')[0]} y2={getPoint(3, i).split(',')[1]} stroke="#1f2937" strokeWidth="1" />
                    ))}
                    <polygon points={polygonPoints} fill="rgba(45, 212, 191, 0.5)" stroke="#2dd4bf" strokeWidth="2" />
                    {dataKeys.map((key, i) => {
                        const [x, y] = getPoint(3.7, i).split(',');
                        return (
                            <text key={i} x={x} y={y} fill="#94a3b8" fontSize="12" fontWeight="bold" textAnchor="middle" dominantBaseline="middle">{dimensions[i]}</text>
                        );
                    })}
                </svg>
            );
        };

        // ==========================================
        // 主程式組件 App
        // ==========================================
        function App() {
            const [gameState, setGameState] = useState('START');
            
            const [playerName, setPlayerName] = useState('');
            const [activeMissions, setActiveMissions] = useState([]);
            const [currentMissionIdx, setCurrentMissionIdx] = useState(0);
            const [currentQuestionIdx, setCurrentQuestionIdx] = useState(0);
            
            const [scores, setScores] = useState({ observation: 0, hypothesis: 0, experiment: 0, data: 0, conclusion: 0 });
            const [mistakes, setMistakes] = useState(0);
            const [feedback, setFeedback] = useState(null); 

            const [showPasswordPrompt, setShowPasswordPrompt] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [passwordError, setPasswordError] = useState(false);

            const bgmRef = useRef(null);
            const [isBgmPlaying, setIsBgmPlaying] = useState(false);
            const [volume, setVolume] = useState(0.5);
            const [isFullscreen, setIsFullscreen] = useState(false);

            useEffect(() => {
                bgmRef.current = new SciFiBGM();
                bgmRef.current.setVolume(volume);

                const handleFullscreenChange = () => {
                    setIsFullscreen(!!document.fullscreenElement);
                };
                document.addEventListener('fullscreenchange', handleFullscreenChange);

                return () => {
                    if (bgmRef.current) bgmRef.current.stop();
                    document.removeEventListener('fullscreenchange', handleFullscreenChange);
                };
            }, []);

            useEffect(() => {
                if (!bgmRef.current) return;
                if (gameState === 'PLAYING' || gameState === 'RESULT') {
                    bgmRef.current.setMode('FOCUS');
                } else {
                    bgmRef.current.setMode('WAR_ROOM');
                }
            }, [gameState]);

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch((err) => console.error(err));
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                }
            };

            const toggleAudio = () => {
                if (!bgmRef.current) return;
                if (isBgmPlaying) {
                    bgmRef.current.stop();
                    setIsBgmPlaying(false);
                } else {
                    bgmRef.current.play();
                    setIsBgmPlaying(true);
                }
            };

            const handleVolumeChange = (e) => {
                const newVol = parseFloat(e.target.value);
                setVolume(newVol);
                if (bgmRef.current) bgmRef.current.setVolume(newVol);
            };

            const [classData, setClassData] = useState([
                { name: "王小明", rank: "B", scores: { observation: 2, hypothesis: 1, experiment: 1, data: 2, conclusion: 2 }, isNew: false },
                { name: "李華", rank: "A", scores: { observation: 3, hypothesis: 2, experiment: 3, data: 2, conclusion: 3 }, isNew: false },
            ]);

            const generateMissionRun = () => {
                const run = [];
                const pools = [POOL_TYPE_1, POOL_TYPE_2, POOL_TYPE_3];
                pools.forEach((pool, index) => {
                    const randomStory = pool[Math.floor(Math.random() * pool.length)];
                    const randomVar = randomStory.variations[Math.floor(Math.random() * randomStory.variations.length)];
                    run.push({
                        id: `M${index+1}_${randomStory.storyId}_${randomVar.vId}`,
                        title: randomStory.title,
                        description: randomStory.description,
                        dataDisplay: randomVar.dataDisplay,
                        header: randomVar.header,
                        questions: randomVar.questions
                    });
                });
                return run;
            };

            const initiateAuth = () => {
                setPlayerName(''); 
                setGameState('AUTH');
            };

            const startGame = () => {
                if (!playerName.trim()) return; 
                setGameState('PLAYING');

                if (!isBgmPlaying && bgmRef.current) {
                    bgmRef.current.setMode('FOCUS'); 
                    bgmRef.current.play();
                    setIsBgmPlaying(true);
                }

                const newRun = generateMissionRun();
                setActiveMissions(newRun);
                setScores({ observation: 0, hypothesis: 0, experiment: 0, data: 0, conclusion: 0 });
                setCurrentMissionIdx(0);
                setCurrentQuestionIdx(0);
                setMistakes(0);
                setFeedback(null);
            };

            const currentMission = activeMissions[currentMissionIdx];
            const currentQuestion = currentMission?.questions[currentQuestionIdx];

            const handleAnswer = (selectedIndex) => {
                if (selectedIndex === currentQuestion.correctAnswer) {
                    let earnedPoints = 3;
                    if (mistakes === 1) earnedPoints = 2;
                    if (mistakes >= 2) earnedPoints = 1;

                    setScores(prev => ({ ...prev, [currentQuestion.dimension]: earnedPoints }));
                    setFeedback({ type: 'success', text: "正確！特務系統已記錄數據。" });
                    
                    setTimeout(() => {
                        setFeedback(null);
                        setMistakes(0);
                        if (currentQuestionIdx < currentMission.questions.length - 1) {
                            setCurrentQuestionIdx(prev => prev + 1);
                        } else if (currentMissionIdx < activeMissions.length - 1) {
                            setCurrentMissionIdx(prev => prev + 1);
                            setCurrentQuestionIdx(0);
                        } else {
                            setGameState('RESULT');
                        }
                    }, 1500);

                } else {
                    setMistakes(prev => prev + 1);
                    setFeedback({ type: 'error', text: `錯誤！夸克提示：${currentQuestion.hint}` });
                }
            };

            const getRank = () => {
                const total = Object.values(scores).reduce((a, b) => a + b, 0);
                if (total >= 13) return { rank: 'S', title: '傳奇科學特務', color: 'text-yellow-400' };
                if (total >= 9) return { rank: 'A', title: '菁英搜查官', color: 'text-purple-400' };
                return { rank: 'B', title: '前線探勘員', color: 'text-blue-400' };
            };

            const saveToTeacherData = () => {
                const playerRank = getRank().rank;
                setClassData(prev => [
                    ...prev.map(p => ({ ...p, isNew: false })), 
                    { name: playerName.trim() || "未知特務", rank: playerRank, scores: { ...scores }, isNew: true }
                ]);
                setGameState('START'); 
            };

            const handleLogin = () => {
                if (passwordInput === 'LUTHIAN13') { 
                    setShowPasswordPrompt(false);
                    setPasswordInput('');
                    setPasswordError(false);
                    setGameState('TEACHER');
                } else {
                    setPasswordError(true);
                }
            };

            return (
                <div className="min-h-screen pb-10 flex flex-col relative w-full h-full">
                    {/* 頂部導航列 */}
                    <nav className="bg-slate-800 border-b border-teal-500/30 p-4 flex justify-between items-center shadow-[0_0_15px_rgba(45,212,191,0.1)] sticky top-0 z-40">
                        <div className="flex items-center space-x-3">
                            <Shield className="text-teal-400 w-6 h-6" />
                            <span className="text-teal-400 font-bold tracking-widest uppercase hidden sm:inline-block">S.I.A. 科學特務局</span>
                            <span className="text-teal-400 font-bold tracking-widest uppercase sm:hidden">S.I.A.</span>
                        </div>
                        
                        <div className="flex items-center space-x-5">
                            {/* 音量控制區塊 */}
                            <div className="flex items-center space-x-2 group">
                                <button 
                                    onClick={toggleAudio} 
                                    className="text-slate-400 hover:text-teal-400 transition transform hover:scale-110"
                                    title={isBgmPlaying ? "關閉音樂" : "播放音樂"}
                                >
                                    {isBgmPlaying && volume > 0 ? <Volume2 className="w-5 h-5" /> : <VolumeX className="w-5 h-5" />}
                                </button>
                                
                                <input 
                                    type="range" 
                                    min="0" max="1" step="0.01" 
                                    value={volume} 
                                    onChange={handleVolumeChange} 
                                    className={`w-16 sm:w-24 h-1.5 bg-slate-600 rounded-lg appearance-none cursor-pointer accent-teal-400 transition-opacity ${isBgmPlaying ? 'opacity-100' : 'opacity-30'}`}
                                    title="調整音量"
                                />
                            </div>

                            <button onClick={toggleFullscreen} className="text-slate-400 hover:text-teal-400 transition transform hover:scale-110" title={isFullscreen ? "退出全螢幕" : "進入全螢幕"}>
                                {isFullscreen ? <Minimize className="w-5 h-5" /> : <Maximize className="w-5 h-5" />}
                            </button>

                            <div className="w-px h-6 bg-slate-700"></div>

                            {gameState !== 'START' && gameState !== 'TEACHER' && (
                                <button onClick={() => setGameState('START')} className="text-sm font-medium text-slate-400 hover:text-orange-400 transition">
                                    <span className="hidden sm:inline">放棄任務 / </span>登出
                                </button>
                            )}
                            {gameState === 'TEACHER' && (
                                <button onClick={() => setGameState('START')} className="flex items-center text-sm font-medium text-teal-400 hover:text-teal-300 transition">
                                    <LogOut className="w-4 h-4 mr-2"/> 返回
                                </button>
                            )}
                        </div>
                    </nav>

                    <main className="max-w-4xl w-full mx-auto mt-8 px-4 flex-grow">
                        {/* ================= START SCREEN ================= */}
                        {gameState === 'START' && (
                            <div className="text-center space-y-8 mt-20 fade-in">
                                <div className="inline-block p-4 rounded-full bg-teal-500/10 mb-4 shadow-[0_0_30px_rgba(45,212,191,0.2)]">
                                    <Activity className="w-16 h-16 text-teal-400 animate-pulse" />
                                </div>
                                <h1 className="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-blue-500 drop-shadow-lg tracking-tight">
                                    異象調查專案
                                </h1>
                                <p className="text-lg text-slate-400 max-w-2xl mx-auto leading-relaxed">
                                    見習特務，新的異常能量反應已經出現。<br/>
                                    總局已將你指派至本次調查任務中，請發揮你的科學探究能力。<br/>
                                    準備好出發了嗎？
                                </p>
                                
                                <div className="flex justify-center space-x-6 pt-8">
                                    <button onClick={initiateAuth} className="flex items-center px-8 py-4 bg-teal-500 hover:bg-teal-400 text-slate-900 font-bold rounded-lg uppercase tracking-widest shadow-[0_0_20px_rgba(45,212,191,0.4)] transition transform hover:-translate-y-1 whitespace-nowrap">
                                        <Play className="w-5 h-5 mr-2" /> 開始任務
                                    </button>
                                    <button onClick={() => setShowPasswordPrompt(true)} className="px-8 py-4 bg-slate-800 border border-slate-600 hover:border-slate-400 text-slate-300 font-bold rounded-lg uppercase tracking-widest transition whitespace-nowrap">
                                        局長戰情室
                                    </button>
                                </div>

                                {showPasswordPrompt && (
                                    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 text-left fade-in">
                                        <div className="bg-slate-800 p-8 rounded-xl border border-teal-500/50 shadow-[0_0_30px_rgba(45,212,191,0.2)] max-w-md w-full mx-4 zoom-in">
                                            <h3 className="text-2xl font-bold text-teal-400 mb-4 flex items-center">
                                                <Shield className="mr-3 w-6 h-6" /> 權限驗證
                                            </h3>
                                            <p className="text-slate-400 mb-6 leading-relaxed">
                                                正在嘗試存取最高機密資料庫。<br/>
                                                <span className="text-teal-500/80 font-medium">提示：請輸入特務局長專屬的授權金鑰。</span>
                                            </p>
                                            <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleLogin()} className="w-full bg-slate-900 border border-slate-600 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-teal-400 mb-4" placeholder="輸入金鑰..." autoFocus />
                                            {passwordError && <p className="text-orange-400 text-sm mb-4">金鑰無效，存取被拒絕。</p>}
                                            <div className="flex justify-end space-x-4 mt-2">
                                                <button onClick={() => { setShowPasswordPrompt(false); setPasswordInput(''); setPasswordError(false); }} className="px-4 py-2 text-slate-400 hover:text-white transition">取消</button>
                                                <button onClick={handleLogin} className="px-6 py-2 bg-teal-500 hover:bg-teal-400 text-slate-900 font-bold rounded-lg transition">解鎖</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ================= AUTH SCREEN ================= */}
                        {gameState === 'AUTH' && (
                            <div className="max-w-md mx-auto mt-20 fade-in zoom-in">
                                <div className="bg-slate-800 border border-teal-500/50 rounded-xl p-8 shadow-[0_0_30px_rgba(45,212,191,0.15)] relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-teal-400"></div>
                                    <div className="flex justify-center mb-6 text-teal-400"><User className="w-12 h-12" /></div>
                                    <h2 className="text-2xl font-bold text-center text-white mb-2 tracking-widest">特務身分核實</h2>
                                    <p className="text-slate-400 text-center text-sm mb-8">總局正在為您建立專屬探勘檔案，請輸入真實姓名。</p>
                                    <div className="space-y-6">
                                        <input type="text" value={playerName} onChange={(e) => setPlayerName(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && playerName.trim() && startGame()} className="w-full bg-slate-900 border-2 border-slate-700 text-teal-300 px-4 py-3 rounded-lg focus:outline-none focus:border-teal-400 text-center text-xl font-bold" placeholder="輸入姓名..." autoFocus />
                                        <button onClick={startGame} disabled={!playerName.trim()} className="w-full py-4 bg-teal-600 hover:bg-teal-500 disabled:opacity-50 text-white font-bold rounded-lg transition tracking-widest flex justify-center items-center shadow-lg">
                                            <Terminal className="w-5 h-5 mr-2" /> 建立檔案並連線
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ================= PLAYING SCREEN ================= */}
                        {gameState === 'PLAYING' && currentMission && (
                            <div className="space-y-6 fade-in">
                                <div className="flex justify-end">
                                    <div className="bg-slate-800/80 px-4 py-2 rounded-lg border border-slate-700 text-sm shadow-md">
                                        <span className="text-slate-400 mr-2">探員:</span><span className="text-teal-400 font-bold">{playerName}</span>
                                    </div>
                                </div>

                                <div className="bg-slate-800 border border-slate-700 rounded-xl p-6 relative overflow-hidden shadow-lg">
                                    <div className="absolute top-0 left-0 w-2 h-full bg-teal-500"></div>
                                    <div className="flex items-center justify-between mb-2">
                                        <h2 className="text-2xl font-bold text-teal-400 drop-shadow-md">{currentMission.title}</h2>
                                        <span className="text-xs font-bold tracking-wider bg-slate-700 border border-slate-600 text-teal-300 px-3 py-1 rounded-full">任務 {currentMissionIdx + 1} / 3</span>
                                    </div>
                                    <p className="text-slate-300 leading-relaxed mt-4">{currentMission.description}</p>
                                </div>

                                {currentMission.dataDisplay && (
                                    <div className="bg-slate-800/50 border border-slate-700 p-4 rounded-xl shadow-inner">
                                        <h3 className="text-sm text-slate-400 mb-3 flex items-center font-bold tracking-wider"><Database className="w-4 h-4 mr-2"/> 觀測數據中心：</h3>
                                        <div className="overflow-x-auto rounded-lg border border-slate-700">
                                            <table className="w-full text-sm text-left text-slate-300">
                                                <thead className="text-xs text-slate-400 uppercase bg-slate-800 border-b border-slate-700">
                                                    <tr>{currentMission.header.map((th, i) => <th key={i} className="px-4 py-3">{th}</th>)}</tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-700/50">
                                                    {currentMission.dataDisplay.map((row, idx) => (
                                                        <tr key={idx} className="bg-slate-800/30 hover:bg-slate-700/30 transition">
                                                            <td className="px-4 py-3 font-medium text-slate-300">{row.label}</td>
                                                            <td className="px-4 py-3 font-bold text-orange-400">{row.var1}</td>
                                                            <td className="px-4 py-3 font-bold text-teal-400">{row.var2}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                <div className="bg-slate-800 shadow-xl rounded-xl p-6 border border-slate-700 relative">
                                    <h3 className="text-lg font-semibold mb-6 flex items-start leading-relaxed text-white">
                                        <span className="bg-teal-500/20 text-teal-400 p-1 rounded mr-3 mt-1 shrink-0"><Microscope className="w-5 h-5"/></span>
                                        {currentQuestion.text}
                                    </h3>
                                    <div className="space-y-3">
                                        {currentQuestion.options.map((opt, idx) => (
                                            <button
                                                key={idx}
                                                onClick={() => handleAnswer(idx)}
                                                disabled={feedback?.type === 'success'}
                                                className="w-full text-left p-4 rounded-lg bg-slate-700/50 hover:bg-slate-600 border border-slate-600 hover:border-teal-400 transition flex items-center disabled:opacity-50 group"
                                            >
                                                <span className="w-8 h-8 rounded-full bg-slate-800 border border-slate-600 group-hover:border-teal-400 text-slate-400 group-hover:text-teal-400 flex items-center justify-center mr-4 font-bold shrink-0 transition">
                                                    {String.fromCharCode(65 + idx)}
                                                </span>
                                                <span className="text-slate-200">{opt}</span>
                                            </button>
                                        ))}
                                    </div>

                                    {feedback && (
                                        <div className={`mt-6 p-4 rounded-lg flex items-start border slide-in-from-bottom-2 ${feedback.type === 'success' ? 'bg-teal-900/30 border-teal-500/50 text-teal-300' : 'bg-orange-900/30 border-orange-500/50 text-orange-300'}`}>
                                            {feedback.type === 'success' ? <CheckCircle className="w-6 h-6 mr-3 shrink-0" /> : <AlertTriangle className="w-6 h-6 mr-3 shrink-0" />}
                                            <div><strong>{feedback.type === 'success' ? '正確' : '提示'}</strong>：{feedback.text}</div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ================= RESULT SCREEN ================= */}
                        {gameState === 'RESULT' && (
                            <div className="space-y-8 zoom-in">
                                <div className="text-center">
                                    <h2 className="text-3xl font-bold text-white mb-2 drop-shadow-md">測驗完成，正在分析數據...</h2>
                                    <p className="text-slate-400">特務局已收到 <span className="text-teal-400 font-bold">{playerName}</span> 的結案報告</p>
                                </div>
                                <div className="grid md:grid-cols-2 gap-8">
                                    <div className="bg-slate-800 border border-slate-700 rounded-xl p-8 flex flex-col items-center justify-center text-center shadow-lg relative overflow-hidden">
                                        <div className="absolute -inset-10 bg-gradient-to-br from-teal-500/10 to-blue-500/10 blur-2xl"></div>
                                        <span className="text-slate-400 mb-2 uppercase tracking-widest text-sm relative">評定階級</span>
                                        <div className={`text-8xl font-black mb-4 drop-shadow-[0_0_15px_rgba(255,255,255,0.2)] relative ${getRank().color}`}>{getRank().rank}</div>
                                        <h3 className="text-2xl font-bold text-white mb-2 relative">{getRank().title}</h3>
                                    </div>
                                    <div className="bg-slate-800 border border-slate-700 rounded-xl p-8 shadow-lg">
                                        <h3 className="text-center font-bold text-teal-400 mb-6 uppercase tracking-wider flex items-center justify-center">
                                            <BarChart2 className="w-5 h-5 mr-2" />探究能力雷達圖
                                        </h3>
                                        <RadarChart data={scores} />
                                    </div>
                                </div>
                                <div className="text-center mt-8">
                                    <button onClick={saveToTeacherData} className="px-8 py-4 bg-teal-600 hover:bg-teal-500 text-white font-bold rounded-lg transition tracking-widest shadow-[0_0_20px_rgba(13,148,136,0.3)] hover:scale-105 transform">
                                        上傳特務報告並返回總部
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* ================= TEACHER SCREEN ================= */}
                        {gameState === 'TEACHER' && (
                            <div className="space-y-6 fade-in">
                                <h2 className="text-3xl font-bold text-teal-400 flex items-center"><Users className="mr-3 w-8 h-8"/> 局長戰情室</h2>
                                <div className="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden shadow-xl">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-900 border-b border-slate-700 text-slate-300 text-sm uppercase tracking-wider">
                                                <tr>
                                                    <th className="px-6 py-4">探員姓名</th>
                                                    <th className="px-6 py-4">最終評級</th>
                                                    <th className="px-6 py-4">能力分佈 (定題/假設/設計/讀圖/結論)</th>
                                                    <th className="px-6 py-4">狀態</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-700/50">
                                                {classData.map((student, i) => (
                                                    <tr key={i} className={`hover:bg-slate-700/50 transition ${student.isNew ? 'bg-teal-900/20' : ''}`}>
                                                        <td className="px-6 py-4 font-bold text-white">{student.name}</td>
                                                        <td className="px-6 py-4"><span className={`font-black text-lg ${student.rank === 'S' ? 'text-yellow-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.5)]' : student.rank === 'A' ? 'text-purple-400' : 'text-blue-400'}`}>{student.rank}</span></td>
                                                        <td className="px-6 py-4 text-sm text-slate-300 font-mono tracking-tight">
                                                            {Object.values(student.scores).join(' / ')}
                                                        </td>
                                                        <td className="px-6 py-4 text-xs font-bold uppercase tracking-wider">
                                                            {student.isNew ? <span className="text-teal-400 bg-teal-400/10 px-2 py-1 rounded">剛剛上傳</span> : <span className="text-slate-500">已封存</span>}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        // 初始化與渲染
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
